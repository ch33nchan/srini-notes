<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenPilot Notes | Srini Notes</title>
    <meta name="description" content="OpenPilot model and codewalk notes.">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body class="reader-shell" data-project="openpilot">
    <header class="topbar">
      <a class="brand" href="../" aria-label="Back to project list">
        <span class="brand-mark">S</span>
        <span>Srini Notes</span>
      </a>
      <button class="sidebar-toggle" type="button" aria-expanded="false" aria-controls="reader-sidebar">
        Notes
      </button>
    </header>

    <div class="reader-layout">
      <aside class="sidebar" id="reader-sidebar">
        <div class="sidebar-heading">
          <span class="eyebrow">project</span>
          <h1>openpilot</h1>
        </div>
        <nav class="note-list" id="note-list" aria-label="OpenPilot notes"></nav>
      </aside>

      <main class="reader-main">
        <article class="note-article" id="note-content" aria-live="polite">
          <div class="loading">Loading notes...</div>
        </article>
      </main>

      <aside class="toc-panel" aria-label="Table of contents">
        <div class="toc-title">On This Page</div>
        <nav id="toc"></nav>
      </aside>
    </div>

    <script src="../assets/reader.js"></script>
  </body>
</html>
